services:
  - type: web
    name: real-estate-snapshot
    runtime: static
    # el export del snapshot lo lanza el hook `prebuild` de package.json antes de `astro build`
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: CONTENT_ISLAND_ACCESS_TOKEN
        sync: false # se rellena en el dashboard de Render (secreto)
